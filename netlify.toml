[build]
publish = "public"
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "20"

[functions]
node_bundler = "esbuild"

[[redirects]]
from = "/api/auth"
to = "/.netlify/functions/auth"
status = 200

[[redirects]]
from = "/api/profiles"
to = "/.netlify/functions/profiles"
status = 200

[[redirects]]
from = "/api/profile"
to = "/.netlify/functions/profile"
status = 200

[[redirects]]
from = "/api/webauthn"
to = "/.netlify/functions/webauthn"
status = 200

[[redirects]]
from = "/api/push"
to = "/.netlify/functions/push"
status = 200

[[redirects]]
from = "/api/vapid-public-key"
to = "/.netlify/functions/vapid-public-key"
status = 200
